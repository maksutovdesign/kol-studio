<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07071A"/>
      <stop offset="100%" style="stop-color:#1A0A30"/>
    </linearGradient>
    <linearGradient id="grd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D42B6A"/>
      <stop offset="100%" style="stop-color:#8B2BE2"/>
    </linearGradient>
    <linearGradient id="grd2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D42B6A;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8B2BE2;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="140" cy="140" r="200" fill="url(#grd2)"/>
  <!-- KOL text -->
  <text x="256" y="295"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="180"
        text-anchor="middle"
        fill="url(#grd)"
        letter-spacing="-8">KOL</text>
  <!-- 18+ badge -->
  <rect x="350" y="48" width="114" height="44" rx="12" fill="#D42B6A"/>
  <text x="407" y="78"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="26"
        text-anchor="middle"
        fill="white">18+</text>
  <!-- STUDIO text -->
  <text x="256" y="370"
        font-family="Arial, sans-serif"
        font-weight="300"
        font-size="52"
        text-anchor="middle"
        fill="rgba(240,240,255,0.5)"
        letter-spacing="18">STUDIO</text>
</svg>
