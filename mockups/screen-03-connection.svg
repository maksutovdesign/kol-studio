  <rect x="360" y="420" width="160" height="180" rx="80" fill="rgba(255,255,255,0.04)"/>

  <!-- Camera scan lines effect -->
  <rect x="20" y="81" width="840" height="2" fill="rgba(255,255,255,0.04)"/>
  <rect x="20" y="175" width="840" height="2" fill="rgba(255,255,255,0.03)"/>
  <rect x="20" y="269" width="840" height="2" fill="rgba(255,255,255,0.03)"/>
  <rect x="20" y="363" width="840" height="2" fill="rgba(255,255,255,0.03)"/>
  <rect x="20" y="457" width="840" height="2" fill="rgba(255,255,255,0.03)"/>
  <rect x="20" y="551" width="840" height="2" fill="rgba(255,255,255,0.03)"/>

  <!-- LIVE indicator -->
  <rect x="40" y="101" width="70" height="28" rx="14" fill="url(#liveBadge)" filter="url(#liveGlow)"/>
