  <text x="700" y="636" font-size="24">&#128150;</text>
  <text x="736" y="636" font-size="24">&#128293;</text>
  <text x="772" y="636" font-size="24">&#11088;</text>
  <text x="808" y="636" font-size="24">&#128064;</text>

