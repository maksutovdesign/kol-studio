  <rect x="1030" y="370" width="360" height="36" rx="18" fill="url(#msgBubble)" stroke="#D42B6A" stroke-width="1" opacity="0.9"/>
  <text x="1050" y="393" font-size="13" fill="#EEEEFF">Интересует что-то в стиле boudoir</text>
  <text x="1352" y="414" font-size="10" fill="#555577">14:24</text>

  <!-- Model message 3 -->
  <circle cx="906" cy="438" r="16" fill="url(#videoGrad)" opacity="0.8"/>
  <text x="900" y="443" font-size="10" fill="white">АМ</text>
  <rect x="930" y="420" width="310" height="80" rx="12" fill="#1A1A35"/>
  <text x="950" y="440" font-size="13" fill="#CCCCDD">Конечно, это мой любимый стиль &#128149;</text>
  <text x="950" y="460" font-size="13" fill="#CCCCDD">Могу предложить 3 варианта пакета.</text>
  <text x="950" y="480" font-size="13" fill="#D42B6A">Посмотреть предложения &#8594;</text>
