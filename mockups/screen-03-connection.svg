<svg width="1440" height="900" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="pageBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07071A"/>
      <stop offset="100%" stop-color="#110828"/>
    </linearGradient>
    <linearGradient id="videoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D0E5C"/>
      <stop offset="100%" stop-color="#A01850"/>
    </linearGradient>
    <linearGradient id="videoOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#07071A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#07071A" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="accentBtn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D42B6A"/>
      <stop offset="100%" stop-color="#8B2BE2"/>
    </linearGradient>
    <linearGradient id="chatBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111128"/>
      <stop offset="100%" stop-color="#0D0D22"/>
    </linearGradient>
    <linearGradient id="msgBubble" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D42B6A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8B2BE2" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="liveBadge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1744"/>
      <stop offset="100%" stop-color="#FF6D00"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#D42B6A" flood-opacity="0.5"/>
    </filter>
    <filter id="liveGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#FF1744" flood-opacity="0.6"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="url(#pageBg)"/>

  <!-- ===== HEADER ===== -->
  <rect width="1440" height="60" fill="#0A0A1E" opacity="0.98"/>
  <rect y="60" width="1440" height="1" fill="#2A2A50"/>

  <text x="28" y="38" font-weight="900" font-size="24" fill="#D42B6A" letter-spacing="4">KOL</text>
  <text x="28" y="52" font-size="8" fill="#8B2BE2" letter-spacing="6">STUDIO</text>

  <!-- Session info -->
  <rect x="110" y="16" width="2" height="28" fill="#2A2A50"/>
  <text x="126" y="32" font-size="13" fill="#CCCCDD" font-weight="600">Анна Морозова</text>
  <circle cx="220" cy="30" r="5" fill="#00E676"/>
  <text x="230" y="34" font-size="11" fill="#00E676">Онлайн</text>

  <!-- Session type tabs -->
  <rect x="400" y="12" width="100" height="36" rx="18" fill="url(#accentBtn)"/>
  <text x="435" y="35" font-size="13" fill="white" font-weight="700">&#128172; Чат</text>

  <rect x="510" y="12" width="110" height="36" rx="18" fill="#1A1A30" stroke="#2A2A50" stroke-width="1"/>
  <text x="537" y="35" font-size="13" fill="#888899">&#127909; Видео</text>

  <rect x="630" y="12" width="110" height="36" rx="18" fill="#1A1A30" stroke="#2A2A50" stroke-width="1"/>
  <text x="657" y="35" font-size="13" fill="#888899">&#128250; Live</text>

