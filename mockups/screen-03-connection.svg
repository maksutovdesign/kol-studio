  <text x="440" y="820" font-size="13" fill="#C580FF" font-weight="600">Особое пожелание</text>
  <text x="440" y="838" font-size="11" fill="#888899">Свой запрос — обсудить лично</text>
  <rect x="424" y="855" width="200" height="4" rx="2" fill="#8B2BE2" opacity="0.4"/>

  <rect x="636" y="764" width="180" height="100" rx="12" fill="#111128" stroke="#2A2A50" stroke-width="1"/>
  <text x="652" y="796" font-size="24">&#128222;</text>
  <text x="652" y="820" font-size="13" fill="#CCCCDD" font-weight="600">Контакты</text>
  <text x="652" y="838" font-size="11" fill="#888899">Узнать контакты модели</text>


