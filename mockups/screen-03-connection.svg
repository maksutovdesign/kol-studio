  <text x="1148" y="36" font-size="13" fill="#D42B6A" font-weight="700">$25</text>
  <text x="1173" y="36" font-size="11" fill="#555577">· оплачено</text>

  <rect x="1250" y="14" width="80" height="32" rx="16" fill="#1E1E38" stroke="#2A2A50" stroke-width="1"/>
  <text x="1272" y="35" font-size="12" fill="#888899">Помощь</text>

  <rect x="1342" y="14" width="80" height="32" rx="16" fill="#3A0A1A" stroke="#FF1744" stroke-width="1"/>
  <text x="1361" y="35" font-size="12" fill="#FF4444">Завершить</text>

