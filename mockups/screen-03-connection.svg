  <text x="905" y="97" font-size="14" fill="rgba(255,255,255,0.8)">АМ</text>

  <text x="940" y="86" font-size="14" fill="#EEEEFF" font-weight="700">Анна Морозова</text>
  <circle cx="940" cy="100" r="4" fill="#00E676"/>
