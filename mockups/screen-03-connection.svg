  <rect x="20" y="580" width="840" height="71" rx="0" fill="url(#videoOverlay)"/>
  <rect x="20" y="607" width="840" height="44" rx="0" fill="#07071A" opacity="0.6"/>
  <rect x="20" y="635" width="840" height="16" rx="0" fill="#07071A"/>

  <!-- Model name on video -->
  <text x="44" y="636" font-size="20" fill="white" font-weight="800">Анна Морозова</text>
  <text x="44" y="656" font-size="12" fill="rgba(255,255,255,0.6)">Fashion · Portrait · Live</text>

  <!-- Video controls bar -->
  <rect x="20" y="651" width="840" height="0" fill="none"/>

