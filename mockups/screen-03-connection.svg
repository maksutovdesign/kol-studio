  <rect x="930" y="286" width="300" height="64" rx="12" fill="#1A1A35"/>
  <text x="950" y="306" font-size="13" fill="#CCCCDD">Отлично! Я сейчас онлайн &#128247;</text>
  <text x="950" y="326" font-size="13" fill="#CCCCDD">Какой стиль вас интересует?</text>
  <text x="950" y="342" font-size="13" fill="#CCCCDD">Fashion, портрет или что-то особое?</text>
  <text x="1192" y="358" font-size="10" fill="#555577">14:23</text>

