  <!-- Bio text -->
  <text x="528" y="192" font-size="13" fill="#CCCCDD">Привет! Я профессиональный фотограф и стример с опытом 5+ лет.</text>
  <text x="528" y="212" font-size="13" fill="#888899">Специализируюсь на fashion-съёмках, портрете и лайфстайл.</text>
  <text x="528" y="232" font-size="13" fill="#888899">Открыта к нестандартным проектам и особым пожеланиям клиентов.</text>
  <text x="528" y="252" font-size="13" fill="#888899">Работаю с брендами, агентствами и частными лицами.</text>

