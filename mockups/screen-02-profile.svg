<svg width="1440" height="900" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="pageBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09091A"/>
      <stop offset="100%" stop-color="#150A28"/>
    </linearGradient>
    <linearGradient id="photoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5C1A7A"/>
      <stop offset="100%" stop-color="#D42B6A"/>
    </linearGradient>
    <linearGradient id="photoOverlay" x1="0%" y1="60%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#09091A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#09091A" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="accentBtn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D42B6A"/>
      <stop offset="100%" stop-color="#8B2BE2"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A30"/>
      <stop offset="100%" stop-color="#13132A"/>
    </linearGradient>
    <linearGradient id="sideCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E38"/>
      <stop offset="100%" stop-color="#16162C"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#D42B6A" flood-opacity="0.15"/>
    </filter>
    <filter id="glowPink">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#D42B6A" flood-opacity="0.6"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-width="0.15" opacity="0.3"/>
