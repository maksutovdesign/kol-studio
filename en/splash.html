  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:      #07071A;
      --card:    #111128;
      --card2:   #181835;
      --border:  #22224A;
      --accent:  #D42B6A;
      --accent2: #8B2BE2;
      --muted:   rgba(255,255,255,0.40);
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: #fff;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #22224A 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow top-left */
    .glow-tl {
      position: fixed;
      top: -220px;
      left: -220px;
      width: 640px;
      height: 640px;
      background: radial-gradient(circle, rgba(212,43,106,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow bottom-right */
    .glow-br {
      position: fixed;
      bottom: -220px;
      right: -220px;
      width: 640px;
      height: 640px;
      background: radial-gradient(circle, rgba(139,43,226,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Starfield canvas */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* Main centered layout */
    .splash {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 24px;
      text-align: center;
    }

    /* ── Ring ── */
    .ring-wrap {
      width: 120px;
      height: 120px;
      position: relative;
      margin-bottom: 32px;

      /* hidden until body.loaded */
      opacity: 0;
      transform: scale(0);
      animation: none;
    }

    body.loaded .ring-wrap {
      animation: ringIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) 0s forwards;
    }

    @keyframes ringIn {
      from { opacity: 0; transform: scale(0); }
      to   { opacity: 1; transform: scale(1); }
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
      background:
        linear-gradient(var(--bg), var(--bg)) padding-box,
        linear-gradient(135deg, var(--accent), var(--accent2)) border-box;
      box-shadow:
        0 0 30px rgba(212,43,106,0.35),
        0 0 60px rgba(139,43,226,0.20),
        inset 0 0 20px rgba(212,43,106,0.08);
      animation: ringPulse 2.8s ease-in-out infinite;
      animation-delay: 0.6s;
    }

    @keyframes ringPulse {
      0%, 100% { box-shadow: 0 0 30px rgba(212,43,106,0.35), 0 0 60px rgba(139,43,226,0.20); }
      50%       { box-shadow: 0 0 50px rgba(212,43,106,0.55), 0 0 90px rgba(139,43,226,0.35); }
    }

    .ring-inner {
      position: absolute;
      inset: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(212,43,106,0.15), rgba(139,43,226,0.15));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-k {
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    /* Spinning arc on top of ring */
    .ring-spin {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--accent);
      border-right-color: rgba(139,43,226,0.5);
      animation: spin 1.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── KOL text ── */
    .kol-text {
      font-size: 80px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -3px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;

      opacity: 0;
      transform: translateY(12px);
    }

    body.loaded .kol-text {
      animation: fadeUp 0.5s ease 0.45s forwards;
    }

    /* ── STUDIO text ── */
    .studio-text {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 8px;
      color: rgba(255,255,255,0.90);
      text-transform: uppercase;
      margin-bottom: 20px;

      opacity: 0;
      transform: translateY(8px);
    }

    body.loaded .studio-text {
      animation: fadeUp 0.5s ease 0.75s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 18+ badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 14px;
      border-radius: 100px;
      border: 1.5px solid rgba(212,43,106,0.5);
      background: rgba(212,43,106,0.10);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 48px;

      opacity: 0;
      transform: scale(0.8);
    }

    body.loaded .badge {
      animation: badgeIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 1.05s forwards;
    }

    @keyframes badgeIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Loading bar ── */
    .loader-wrap {
      width: 280px;
      margin-bottom: 32px;

      opacity: 0;
    }

    body.loaded .loader-wrap {
      animation: fadeIn 0.4s ease 1.2s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .loader-track {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 100px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      width: 0%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      box-shadow: 0 0 8px rgba(212,43,106,0.6);
      animation: none;
    }

    body.loaded .loader-fill {
      animation: loadBar 2s cubic-bezier(0.4, 0, 0.2, 1) 1.3s forwards;
    }

    @keyframes loadBar {
      0%   { width: 0%; }
      30%  { width: 35%; }
      60%  { width: 65%; }
      85%  { width: 88%; }
      100% { width: 100%; }
    }

    /* ── Tagline ── */
    .tagline {
      font-size: 15px;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 12px;
      letter-spacing: 0.2px;
      line-height: 1.5;

      opacity: 0;
    }

    body.loaded .tagline {
      animation: fadeIn 0.6s ease 1.5s forwards;
    }

    /* ── Loading text ── */
    .loading-text {
      font-size: 12px;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.5px;

      opacity: 0;
    }

    body.loaded .loading-text {
      animation: fadeIn 0.5s ease 1.7s forwards;
    }

    /* Dot blinking */
    .dot {
      display: inline-block;
      animation: blink 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50%       { opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .kol-text {
        font-size: 56px;
        letter-spacing: -2px;
      }

      .studio-text {
        font-size: 18px;
        letter-spacing: 5px;
      }

      .ring-wrap {
        width: 96px;
        height: 96px;
      }

      .ring-k {
        font-size: 26px;
      }

      .loader-wrap {
        width: 220px;
      }

      .tagline {
        font-size: 13px;
        padding: 0 16px;
      }
    }
  </style>

  <script>
    // ── Starfield ──────────────────────────────────────────────
    (function () {
      const canvas = document.getElementById('stars');
      const ctx    = canvas.getContext('2d');
      const STARS  = [];
      const COUNT  = 28;

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function initStars() {
        STARS.length = 0;
        for (let i = 0; i < COUNT; i++) {
          STARS.push({
            x:     Math.random() * canvas.width,
            y:     Math.random() * canvas.height,
            r:     0.5 + Math.random() * 1.5,
            phase: Math.random() * Math.PI * 2,
            speed: 0.4 + Math.random() * 0.8,
          });
        }
      }

      function drawStars(ts) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const s of STARS) {
          const alpha = 0.15 + 0.55 * (0.5 + 0.5 * Math.sin(s.phase + ts * 0.001 * s.speed));
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
          ctx.fill();
        }
        requestAnimationFrame(drawStars);
      }

      window.addEventListener('resize', () => { resize(); initStars(); });
      resize();
      initStars();
      requestAnimationFrame(drawStars);
    })();

    // ── Redirect logic ─────────────────────────────────────────
    const alreadyVerified = localStorage.getItem('age_verified') === 'true';

    if (alreadyVerified) {
      // Faster load for returning users
      setTimeout(() => {
        window.location.href = 'feed.html';
      }, 1500);
    } else {
      setTimeout(() => {
        window.location.href = 'age-gate.html';
      }, 2500);
    }

    // ── Trigger animation sequence ─────────────────────────────
    // Add 'loaded' class after 500ms so the CSS transitions sequence starts
    setTimeout(() => {
      document.body.classList.add('loaded');
    }, 500);
  </script>
<script>if("serviceWorker"in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").then(r=>console.log("[PWA] SW ok",r.scope)).catch(e=>console.warn("[PWA] SW fail",e));});}</script>

<script id="page-nav-transitions">
(function(){
  document.body.classList.add('kol-entering');
  document.addEventListener('click',function(e){
    const a=e.target.closest('a[href]');
    if(!a)return;
    const href=a.getAttribute('href');
    if(!href||href.startsWith('#')||href.startsWith('http')||href.startsWith('mailto')||href.startsWith('tel'))return;
    if(a.target==="_blank")return;
    e.preventDefault();
    document.body.classList.remove('kol-entering');
    document.body.classList.add('kol-leaving');
    setTimeout(()=>{ window.location.href=href; }, 220);
  });
})();
</script>
